# render.yaml — Render Blueprint for LabOps Agent
#
# Why Render (not Vercel): the agent uses Slack Socket Mode, which holds a
# persistent websocket. Vercel serverless functions are short-lived and cannot
# keep that connection open. A single persistent Render web service hosts BOTH:
#   1. the FastAPI HTTP app (serves the public /chart/forecast PNG that Slack
#      image blocks fetch — needs public HTTPS), and
#   2. the Socket Mode websocket (started in a thread via RUN_SOCKET_MODE=1).
#
# Railway / Fly.io work identically with the same Dockerfile — only the manifest
# format differs.
#
# Deploy:
#   1. Push to GitHub, then in Render: New > Blueprint > select this repo.
#   2. Fill the env vars marked `sync: false` (secrets) in the dashboard.
#   3. After the first deploy, copy the service URL (https://<name>.onrender.com)
#      into the BACKEND_URL env var and redeploy so the forecast chart renders.

services:
  - type: web
    name: labops-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Co-host Socket Mode in the web service (see backend/main.py startup).
      - key: RUN_SOCKET_MODE
        value: "1"
      - key: PYTHONPATH
        value: /app
      # Set to https://<service>.onrender.com after first deploy so Slack image
      # blocks can fetch the forecast chart. Left blank => native Block Kit
      # fields are used instead (chart simply omitted, never broken).
      - key: BACKEND_URL
        sync: false
      # Slack
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      # Note: SLACK_USER_TOKEN was evaluated for search.messages but replaced
      # by conversations_replies (Channel History API) in the current implementation.
      - key: SLACK_USER_TOKEN
        sync: false
      - key: LABOPS_ALERTS_CHANNEL
        value: "#labops-alerts"
      - key: LABOPS_ALERTS_CHANNEL_ID
        sync: false
      # Anthropic / Claude
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      # Database (Supabase cloud)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
